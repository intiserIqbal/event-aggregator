{% extends "layout.html" %}
{% block title %}Edit Event — {{ event.title }}{% endblock %}

{% block content %}
<h2>Edit Event</h2>

<form method="post" class="mt-3">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{% url 'my_events' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}

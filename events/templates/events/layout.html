{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Event Aggregator{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Global styles -->
  <link rel="stylesheet" href="{% static 'events/css/styles.css' %}">

  <!-- Page-specific extra head (e.g. Leaflet CSS) -->
  {% block head_extra %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #0d6efd;">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'index' %}">Event Aggregator</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
        aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link text-white" href="{% url 'index' %}">Home</a>
          </li>
          <li class="nav-item ms-2">
            <!-- High-contrast CTA -->
            <a class="btn btn-warning" href="{% url 'upload_csv' %}">Upload CSV</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <main class="flex-fill">
    <div class="container py-4">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer (optional, lightweight) -->
  <footer class="bg-light text-center py-3 mt-auto">
    <div class="container">
      <small class="text-muted">© {{ now|default:None }} Event Aggregator — Demo project</small>
    </div>
  </footer>

  <!-- Bootstrap JS bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Page-specific scripts (pages should load required libs here, e.g. Leaflet then scripts.js) -->
  {% block scripts %}{% endblock %}
</body>
</html>

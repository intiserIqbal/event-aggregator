{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Upload Events CSV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    #drop-zone {
      border: 2px dashed #ccc;
      border-radius: 10px;
      transition: border-color 0.3s ease;
    }
    #drop-zone.border-primary {
      border-color: #0d6efd;
    }
  </style>
</head>

<body class="bg-light d-flex flex-column" style="min-height: 100vh;">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'index' %}">Event Aggregator</a>
    </div>
  </nav>

  <!-- Main content -->
  <main class="flex-fill d-flex align-items-center justify-content-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-10">

          <div class="card shadow-sm border-0">
            <div class="card-body text-center p-4">
              <h2 class="mb-4">Upload Your Events</h2>

              <div id="drop-zone" class="card shadow-sm border-0 p-4 text-center">
                <form method="post" enctype="multipart/form-data" class="mb-3">
                  {% csrf_token %}
                  <input type="file" name="csv_file" id="csvFileInput" accept=".csv" class="form-control mb-3" required>
                  <button type="submit" class="btn btn-primary w-100">Upload CSV</button>
                </form>
                <p class="text-muted">Drag & drop your CSV file here or click Upload</p>
              </div>

              <!-- Messages inside card -->
              {% if messages %}
              <div class="mt-3 text-start" style="max-height: 150px; overflow-y: auto;">
                {% for message in messages %}
                <div
                  class="alert {% if message.tags == 'error' %}alert-danger{% elif message.tags == 'warning' %}alert-warning{% else %}alert-success{% endif %} mb-2">
                  {{ message }}
                </div>
                {% endfor %}
              </div>
              {% endif %}
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const dropZone = document.getElementById("drop-zone");
      const fileInput = document.getElementById("csvFileInput");

      ["dragenter", "dragover"].forEach(event => {
        dropZone.addEventListener(event, e => {
          e.preventDefault();
          e.stopPropagation();
          dropZone.classList.add("border-primary");
        });
      });

      ["dragleave", "drop"].forEach(event => {
        dropZone.addEventListener(event, e => {
          e.preventDefault();
          e.stopPropagation();
          dropZone.classList.remove("border-primary");
        });
      });

      dropZone.addEventListener("drop", e => {
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          fileInput.files = files;
        }
      });
    });
  </script>
</body>
</html>

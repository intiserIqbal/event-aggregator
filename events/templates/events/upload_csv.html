{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Events CSV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'index' %}">Event Aggregator</a>
    </div>
  </nav>

  <!-- Upload Section -->
  <div class="d-flex flex-column align-items-center justify-content-center" style="height: 80vh;">
    <h2 class="mb-4">Upload Your Events</h2>
    <div class="card shadow-sm p-5 text-center" style="max-width: 600px; border: 2px dashed #ccc;">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Upload CSV</button>
      </form>
      <p class="text-muted mt-3">Drag & drop your CSV file here or click Upload</p>
    </div>

    {% if messages %}
      <div class="mt-3">
        {% for message in messages %}
          <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</body>
</html>

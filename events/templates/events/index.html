{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Aggregator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'events/css/index.css' %}">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body class="container-fluid p-0">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'index' %}">Event Aggregator</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'index' %}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'upload_csv' %}">Upload CSV</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <h1 class="mb-4 text-center">Upcoming Events</h1>

    <!-- Filter Controls -->
    <form id="filter-form" class="row g-3 mb-4">
      <div class="col-md-3">
        <input type="text" id="search" class="form-control" placeholder="Search by title...">
      </div>
      <div class="col-md-3">
        <select id="city" class="form-select">
          <option value="">All Cities</option>
        </select>
      </div>
      <div class="col-md-3">
        <select id="category" class="form-select">
          <option value="">All Categories</option>
        </select>
      </div>
      <div class="col-md-2">
        <input type="date" id="start_date" class="form-control">
      </div>
      <div class="col-md-1 d-grid">
        <button type="button" id="clear-filters" class="btn btn-outline-secondary">Clear</button>
      </div>
    </form>

    <!-- Two-column layout -->
    <div class="row">
      <div class="col-md-7">
        <div id="event-list" class="list-group"></div>
        <div id="loading" class="text-muted mt-2" style="display:none;">Loading events...</div>
      </div>
      <div class="col-md-5">
        <div id="map" style="height: 500px; border-radius: 10px;"></div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Events JS -->
  <script src="{% static 'events/js/index.js' %}"></script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Aggregator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'events/css/index.css' %}">
</head>

<body class="container mt-4">
  <h1 class="mb-4 text-center">Upcoming Events</h1>

  <!-- Filter Controls -->
  <form id="filter-form" class="row g-3 mb-4">
    <div class="col-md-3">
      <input type="text" id="search" class="form-control" placeholder="Search by title...">
    </div>
    <div class="col-md-3">
      <input type="text" id="city" class="form-control" placeholder="City">
    </div>
    <div class="col-md-3">
      <select id="category" class="form-select">
        <option value="">All Categories</option>
        <option value="Music">Music</option>
        <option value="Tech">Tech</option>
        <option value="Food">Food</option>
        <option value="Art">Art</option>
      </select>
    </div>
    <div class="col-md-3">
      <input type="date" id="start_date" class="form-control">
    </div>
  </form>

  <!-- Dynamic Event List -->
  <div id="event-list" class="list-group"></div>

  <!-- Load JS only once -->
  <script src="{% static 'events/js/index.js' %}"></script>
</body>
</html>

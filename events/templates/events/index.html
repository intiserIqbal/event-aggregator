{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Aggregator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'events/css/index.css' %}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body class="container-fluid p-0">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg" style="background-color:#0d6efd;">
    <div class="container">
      <a class="navbar-brand text-white fw-bold" href="{% url 'index' %}">Event Aggregator</a>
      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-warning" href="{% url 'upload_csv' %}">Upload CSV</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header class="hero container my-4 p-4 rounded-3">
    <div class="row align-items-center">
      <div class="col-md-8">
        <h1 class="display-6 fw-bold">Discover local events in one place</h1>
        <p class="lead text-muted">Search, filter, and view events on a live map — upload CSVs to bulk-import events.</p>
        <a class="btn btn-warning btn-lg" href="{% url 'upload_csv' %}">Upload Events</a>
      </div>
      <div class="col-md-4 text-end d-none d-md-block">
        <!-- decorative image or illustration placeholder -->
        <img src="{% static 'events/images/hero-placeholder.png' %}" alt="" style="max-width:220px; border-radius:10px;">
      </div>
    </div>
  </header>

  <main class="container mb-5">
    <!-- Category chips -->
    <section class="mb-3">
      <div id="category-chips" class="d-flex gap-2 flex-wrap"></div>
    </section>

    <!-- Quick filters -->
    <section class="mb-3 d-flex align-items-center gap-3">
      <div class="btn-group" role="group" aria-label="Quick filters">
        <button type="button" class="btn btn-outline-secondary quick-filter" data-mode="all">All</button>
        <button type="button" class="btn btn-outline-secondary quick-filter" data-mode="today">Today</button>
        <button type="button" class="btn btn-outline-secondary quick-filter" data-mode="weekend">This weekend</button>
      </div>

      <form id="filter-form" class="row g-2 ms-auto" style="max-width:720px;">
        <div class="col">
          <input type="text" id="search" class="form-control" placeholder="Search events or keywords">
        </div>
        <div class="col-auto">
          <select id="category" class="form-select" aria-label="Category">
            <option value="">All Categories</option>
          </select>
        </div>
        <div class="col-auto">
          <select id="city" class="form-select" aria-label="City">
            <option value="">All Cities</option>
          </select>
        </div>
        <div class="col-auto">
          <input type="date" id="start_date" class="form-control">
        </div>
        <div class="col-auto d-grid">
          <button type="button" id="clear-filters" class="btn btn-outline-dark">Clear</button>
        </div>
      </form>
    </section>

    <!-- list + map -->
    <div class="row">
      <div class="col-lg-7">
        <div id="event-list" class="row g-3"></div>
        <div id="loading" class="text-muted mt-3" style="display:none;">Loading events...</div>
      </div>
      <div class="col-lg-5">
        <div id="map" style="height: 640px; border-radius: 10px;"></div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{% static 'events/js/index.js' %}"></script>
</body>
</html>

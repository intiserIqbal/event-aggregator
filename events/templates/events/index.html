{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Event Aggregator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

  <h1 class="mb-4">Upcoming Events</h1>
  <!-- Filter Controls -->
  <form id="filter-form" class="row g-3 mb-4">
    <div class="col-md-3">
      <input type="text" id="search" class="form-control" placeholder="Search by title...">
    </div>
    <div class="col-md-3">
      <input type="text" id="city" class="form-control" placeholder="City">
    </div>
    <div class="col-md-3">
      <select id="category" class="form-select">
        <option value="">All Categories</option>
        <option value="Music">Music</option>
        <option value="Tech">Tech</option>
        <option value="Food">Food</option>
        <option value="Art">Art</option>
      </select>
    </div>
    <div class="col-md-3">
      <input type="date" id="start_date" class="form-control">
    </div>
  </form>
  {% if events %}
  <div class="list-group">
    {% for event in events %}
    <div class="list-group-item">
      <h5>{{ event.title }}</h5>
      <p class="mb-1">{{ event.description }}</p>
      <small>
        {{ event.category }} | {{ event.venue }} | {{ event.date|date:"F j, Y, g:i a" }}
      </small>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p>No events found.</p>
  {% endif %}

</body>
<script>
async function fetchEvents() {
  const category = document.getElementById("category").value;
  const city = document.getElementById("city").value;
  const search = document.getElementById("search").value;
  const startDate = document.getElementById("start_date").value;

  // Build query string
  let url = "/api/events/?";
  if (category) url += `category=${encodeURIComponent(category)}&`;
  if (city) url += `city=${encodeURIComponent(city)}&`;
  if (startDate) url += `start_date=${encodeURIComponent(startDate)}T00:00&`;

  // Fetch JSON from API
  const res = await fetch(url);
  const events = await res.json();

  // Filter by title search (client-side)
  const filtered = events.filter(e => 
    !search || e.title.toLowerCase().includes(search.toLowerCase())
  );

  // Render events
  const eventList = document.getElementById("event-list");
  eventList.innerHTML = "";

  if (filtered.length === 0) {
    eventList.innerHTML = "<p>No events found.</p>";
  } else {
    filtered.forEach(e => {
      const item = document.createElement("div");
      item.className = "list-group-item";
      item.innerHTML = `
        <h5>${e.title}</h5>
        <p>${e.description || ""}</p>
        <small>
          ${e.category || ""} | ${e.venue || ""} (${e.city || ""}) |
          ${new Date(e.date).toLocaleString()}
        </small>
      `;
      eventList.appendChild(item);
    });
  }
}

// Attach event listeners
document.getElementById("filter-form").addEventListener("input", fetchEvents);

// Load events on page load
fetchEvents();
</script>
</html>

{% extends "layout.html" %}
{% block title %}Add Event — Event Aggregator{% endblock %}

{% block content %}
<h2 class="mb-4">Add a New Event</h2>

<form method="post" class="mt-3">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Create Event</button>
  <a href="{% url 'my_events' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
